# =============================================================================
# Horilla HRMS — GitHub Actions CI/CD Pipeline
# Triggers: push to main branch
# Pipeline: Test → Build → Push ECR → Deploy ECS
# =============================================================================

name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AWS_REGION:   us-east-1
  APP_NAME:     horilla-hrms
  ECS_CLUSTER:  horilla-production

jobs:
  # ── Job 1: Build & Push Docker image ──────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
      ecr-repo:  ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx (for layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.APP_NAME }}:latest
          cache-to:   type=inline

  # ── Job 2: Deploy to ECS ──────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # requires manual approval if configured

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy web service
        run: |
          # Render task definition with real account ID and image tag
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="${{ needs.build-and-push.outputs.ecr-repo }}:${{ needs.build-and-push.outputs.image-tag }}"

          sed -e "s/ACCOUNT_ID/${ACCOUNT_ID}/g" \
              -e "s|ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/horilla-hrms:latest|${IMAGE}|g" \
              aws/task-web.json > /tmp/task-web-final.json

          aws ecs register-task-definition --cli-input-json file:///tmp/task-web-final.json > /dev/null

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service horilla-web \
            --task-definition horilla-web \
            --force-new-deployment

      - name: Deploy worker service
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="${{ needs.build-and-push.outputs.ecr-repo }}:${{ needs.build-and-push.outputs.image-tag }}"

          sed -e "s/ACCOUNT_ID/${ACCOUNT_ID}/g" \
              -e "s|ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/horilla-hrms:latest|${IMAGE}|g" \
              aws/task-worker.json > /tmp/task-worker-final.json

          aws ecs register-task-definition --cli-input-json file:///tmp/task-worker-final.json > /dev/null

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service horilla-worker \
            --task-definition horilla-worker \
            --force-new-deployment

      - name: Deploy beat service
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE="${{ needs.build-and-push.outputs.ecr-repo }}:${{ needs.build-and-push.outputs.image-tag }}"

          sed -e "s/ACCOUNT_ID/${ACCOUNT_ID}/g" \
              -e "s|ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/horilla-hrms:latest|${IMAGE}|g" \
              aws/task-beat.json > /tmp/task-beat-final.json

          aws ecs register-task-definition --cli-input-json file:///tmp/task-beat-final.json > /dev/null

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service horilla-beat \
            --task-definition horilla-beat \
            --force-new-deployment

      - name: Wait for web service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services horilla-web

      - name: Deployment summary
        run: |
          echo "## Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Cluster   | \`${{ env.ECS_CLUSTER }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region    | \`${{ env.AWS_REGION }}\` |" >> $GITHUB_STEP_SUMMARY
