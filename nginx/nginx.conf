# =============================================================================
# Horilla HRMS — Nginx configuration
#
# Default: HTTP only on port 80 (works immediately after first deploy).
# SSL:     See "STEP 2 — Enable HTTPS" below after certbot issues your certs.
# =============================================================================

worker_processes  auto;               # one worker per CPU core
worker_rlimit_nofile 65536;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ut=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;    # hide nginx version in headers and error pages
    types_hash_max_size 2048;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml+rss
        application/atom+xml image/svg+xml font/woff2;

    # ── Upload size ────────────────────────────────────────────────────────
    # Raise this if employees upload large documents/photos.
    client_max_body_size  50m;
    client_body_timeout   60s;

    # ── Upstream — Gunicorn ────────────────────────────────────────────────
    upstream gunicorn {
        server web:8000;         # "web" = docker-compose service name
        keepalive 32;            # persistent connections to Gunicorn
    }

    # ==========================================================================
    # STEP 1 — HTTP server (active now, works without any SSL certs)
    # ==========================================================================
    server {
        listen 80;
        server_name _;           # catch-all — replace with your domain later

        # ── Static files served directly — no Django / Gunicorn involved ───
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── User-uploaded media files ───────────────────────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── Health check — Nginx responds without hitting Django ────────────
        location /nginx-health {
            return 200 "ok\n";
            access_log off;
        }

        # ── All other requests → Gunicorn / Django ─────────────────────────
        location / {
            proxy_pass         http://gunicorn;
            proxy_redirect     off;

            # Pass real client IP to Django (needed for ALLOWED_HOSTS + logging)
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Match Gunicorn timeouts (gunicorn.conf.py: timeout=120)
            proxy_connect_timeout  60s;
            proxy_send_timeout     120s;
            proxy_read_timeout     120s;

            # Buffering — lets Nginx absorb slow client uploads
            proxy_buffering        on;
            proxy_buffer_size      8k;
            proxy_buffers          16 8k;
        }
    }

    # ==========================================================================
    # STEP 2 — Enable HTTPS (uncomment after running certbot)
